name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# No workflow-level permissions — scoped to job level below.
permissions: {}

jobs:
  release:
    name: Build & attest release
    runs-on: ubuntu-latest

    permissions:
      contents: write      # create GitHub release
      id-token: write      # required for artifact attestation (OIDC)
      attestations: write  # required to write attestation records

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2

      - name: Install dependencies (production only)
        run: composer install --prefer-dist --no-interaction --no-dev --no-progress

      - name: Build release archive
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="arcana-${VERSION}.tar.gz"
          tar --exclude='.git' --exclude='tests' --exclude='.github' \
              -czf "${ARCHIVE}" .
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ env.ARCHIVE }}

      - name: Create GitHub release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            "${{ env.ARCHIVE }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
